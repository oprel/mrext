name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Specify the tag for the release'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build remote client
        run: |
          git clone --depth 1 https://github.com/wizzomafizzo/mrext-client.git /tmp/mrext-client
          npm ci --prefix /tmp/mrext-client
          npm run build --prefix /tmp/mrext-client
          rm -rf cmd/remote/_client/build
          mkdir -p cmd/remote/_client
          cp -a /tmp/mrext-client/build cmd/remote/_client/build

      - name: Build Docker image for ARM
        run: |
          docker buildx create --use
          docker buildx build --load --platform linux/arm/v7 -t mrext/armbuild:${{ github.sha }} -f scripts/armbuild/Dockerfile .

      - name: Run mage prepRelease
        run: |
          docker run --rm --platform linux/arm/v7 \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e GOCACHE=/tmp/go-build \
            -e GOMODCACHE=/tmp/go-mod \
            -e UPX_BIN=upx-ucl \
            -v ${{ github.workspace }}:/build \
            mrext/armbuild:${{ github.sha }} \
            go run github.com/magefile/mage prepRelease

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" _bin/releases/* --clobber
          else
            gh release create "$TAG_NAME" _bin/releases/* --target "$GITHUB_SHA" --title "$TAG_NAME" --notes ""
          fi
